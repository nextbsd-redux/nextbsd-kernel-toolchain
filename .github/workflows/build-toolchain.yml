name: Build Toolchain Containers
on:
  repository_dispatch:
    types: [upstream-updated]
  workflow_dispatch:
  pull_request:
    # Validate the container build on PRs that touch it. PR runs build-only
    # (no push, see below) and never cascade downstream — the dispatch steps
    # are gated on github.ref_name == 'main', which is "<PR#>/merge" on a PR.
    paths:
      - 'Dockerfile.*'
      - '.github/workflows/build-toolchain.yml'
  schedule:
    - cron: '0 6 * * 1'  # weekly fallback

env:
  REGISTRY: ghcr.io
  IMAGE: ghcr.io/nextbsd-redux/nextbsd-kernel-toolchain
  FREEBSD_BRANCH: releng/15.1

jobs:
  build:
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: amd64
            target_arch: amd64
          - target: arm64
            target_arch: aarch64
    permissions:
      packages: write

    steps:
      - uses: actions/checkout@v4

      # gha cache export needs the docker-container driver (the default docker
      # driver can't export cache).
      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Resolve image tags
        id: src
        run: |
          SHA="${{ github.event.client_payload.sha }}"
          # On pull_request, github.ref_name is "<PR#>/merge"; use the source
          # branch (head_ref) and replace "/" so the computed image tag stays a
          # valid Docker reference even though PR builds don't push it.
          BRANCH="${{ github.head_ref || github.ref_name }}"
          BRANCH="${BRANCH//\//-}"
          echo "sha=${SHA}" >> "$GITHUB_OUTPUT"
          # image_tag = the tag downstream jobs should pull.
          if [ "$BRANCH" = "main" ]; then
            echo "image_tag=${{ matrix.target }}-fbsd-${SHA:-tip}" >> "$GITHUB_OUTPUT"
          else
            echo "image_tag=${{ matrix.target }}-${BRANCH}" >> "$GITHUB_OUTPUT"
          fi
          # Tag list to push: BRANCH builds publish ONLY a branch-scoped tag and
          # never touch production; only main publishes :latest + :fbsd-<sha>.
          {
            echo "tags<<EOF"
            echo "${{ env.IMAGE }}:${{ matrix.target }}-${BRANCH}"
            if [ "$BRANCH" = "main" ]; then
              echo "${{ env.IMAGE }}:${{ matrix.target }}-latest"
              echo "${{ env.IMAGE }}:${{ matrix.target }}-fbsd-${SHA:-tip}"
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.${{ matrix.target }}
          # Never publish from a PR — build only, to validate the Dockerfile.
          push: ${{ github.event_name != 'pull_request' }}
          build-args: |
            TARGET=${{ matrix.target }}
            TARGET_ARCH=${{ matrix.target_arch }}
            FREEBSD_BRANCH=${{ env.FREEBSD_BRANCH }}
            FREEBSD_SHA=${{ github.event.client_payload.sha }}
          tags: ${{ steps.src.outputs.tags }}
          # No layer cache: every image is built from scratch off the current
          # FREEBSD_SHA source, so a stale layer can never pin an old base version.
          no-cache: true

      # Only the amd64 leg drives the (amd64-only) kernel build, and only on main
      # — branch/PR builds are for testing and must not cascade or touch prod.
      - name: Trigger downstream kernel build (amd64, main only)
        if: matrix.target == 'amd64' && github.ref_name == 'main'
        run: |
          gh api repos/nextbsd-redux/nextbsd-kernel/dispatches \
            -f event_type=toolchain-updated \
            -f "client_payload[image_tag]=${{ steps.src.outputs.image_tag }}" \
            -f "client_payload[fbsd_sha]=${{ steps.src.outputs.sha }}" \
            -f "client_payload[target]=${{ matrix.target }}"
        env:
          GH_TOKEN: ${{ secrets.DISPATCH_TOKEN }}

      # nextbsd-freebsd-compat consumes the SAME toolchain image as the kernel
      # build (it cross-builds the from-source base with it), so it must rebuild
      # whenever the toolchain/freebsd-src changes — in parallel with the kernel
      # leg. Without this, compat only ever built on manual workflow_dispatch.
      # compat reads client_payload.fbsd_sha to pin its container image tag.
      - name: Trigger downstream base (compat) build (amd64, main only)
        if: matrix.target == 'amd64' && github.ref_name == 'main'
        run: |
          gh api repos/nextbsd-redux/nextbsd-freebsd-compat/dispatches \
            -f event_type=toolchain-updated \
            -f "client_payload[image_tag]=${{ steps.src.outputs.image_tag }}" \
            -f "client_payload[fbsd_sha]=${{ steps.src.outputs.sha }}" \
            -f "client_payload[target]=${{ matrix.target }}"
        env:
          GH_TOKEN: ${{ secrets.DISPATCH_TOKEN }}
